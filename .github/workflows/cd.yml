```yaml
name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: devops-cicd-demo
  CONTAINER_NAME: devops-cicd-demo
  APP_PORT: 3000

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.vars.outputs.SHORT_SHA }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short git SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            pushh-k/devops-cicd-demo:latest
            pushh-k/devops-cicd-demo:${{ steps.vars.outputs.SHORT_SHA }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            IMAGE="pushh-k/devops-cicd-demo:${{ needs.build-and-push.outputs.image_tag }}"

            sudo docker pull "$IMAGE"

            sudo docker stop devops-cicd-demo || true
            sudo docker rm devops-cicd-demo || true

            sudo docker run -d \
              --name devops-cicd-demo \
              --restart unless-stopped \
              -p 3000:3000 \
              "$IMAGE"

            sleep 5

            curl -f http://localhost:3000/health

            echo "Deployment successful"
```
